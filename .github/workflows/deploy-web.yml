# GitHub Actions + GitHub Pages (Vercel 없음)
# 저장소 Settings → Pages → Build and deployment: Source = GitHub Actions
# Secrets: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_GEMINI_API_KEY
# 선택: VITE_GEMINI_MODEL, VITE_SUPABASE_STORAGE_WRITING_BUCKET,
#       VITE_YES24_API_URL, VITE_YES24_API_KEY (Cloud Run YES24 프록시 연동 시)

name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # GitHub Pages 프로젝트 사이트: https://<owner>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_MODEL: ${{ secrets.VITE_GEMINI_MODEL || 'gemini-2.5-flash' }}
          VITE_GEMINI_RESEARCH_MODEL: ${{ secrets.VITE_GEMINI_RESEARCH_MODEL || 'gemini-2.5-flash' }}
          VITE_GEMINI_WRITER_MODEL: ${{ secrets.VITE_GEMINI_WRITER_MODEL || 'gemini-3.5-flash' }}
          VITE_GEMINI_SCAN_MODEL: ${{ secrets.VITE_GEMINI_SCAN_MODEL || 'gemini-3.5-flash' }}
          VITE_SUPABASE_STORAGE_WRITING_BUCKET: ${{ secrets.VITE_SUPABASE_STORAGE_WRITING_BUCKET }}
          VITE_YES24_API_URL: ${{ secrets.VITE_YES24_API_URL }}
          VITE_YES24_API_KEY: ${{ secrets.VITE_YES24_API_KEY }}

      - name: SPA fallback (client-side routes on refresh)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
